seed: 42

paths:
  raw_csv: data/raw/cicids2017.csv
  raw_zip: data/raw/cicids2017_full.zip
  processed_dir: data/processed
  artifacts_dir: artifacts
  figures_dir: reports/figures

data:
  use_full_dataset: true
  test_size: 0.15
  val_size: 0.15
  correlation_threshold: 0.95
  top_k_features: 30
  # Cap benign samples before splitting (null = keep all). Controls RAM on 2.5M-row full dataset.
  max_benign_samples: 500000

smote:
  enabled: true
  # Each minority class is oversampled to this count (or benign count, whichever smaller).
  target_per_minority: 50000
  k_neighbors: 5

models:
  random_forest:
    n_estimators: 150
    max_depth: 25
    class_weight: balanced
    n_jobs: 4

  xgboost:
    optuna_trials: 15
    default:
      n_estimators: 400
      max_depth: 8
      learning_rate: 0.1
      subsample: 0.9
      colsample_bytree: 0.9

  mlp:
    hidden_dims: [256, 128, 64]
    dropout: 0.3
    lr: 0.001
    batch_size: 512
    epochs: 50
    patience: 5

  cnn1d:
    dropout: 0.3
    lr: 0.001
    batch_size: 512
    epochs: 50
    patience: 5

  autoencoder:
    hidden_dims: [64, 32, 16]
    lr: 0.001
    batch_size: 512
    epochs: 50
    threshold_percentile: 99

  isolation_forest:
    n_estimators: 100
